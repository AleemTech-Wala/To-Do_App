<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Application</title>
</head>
<link rel="stylesheet" href="styles.css">
<body>
    <div class="container">
        <h1>📝 My Todo List</h1>
        <div class="stats" id="stats">
            Total: 0 | Active: 0 | Completed: 0
        </div>

        <div class="input-container">
            <input 
                type="text"
                id="todoInput"
                placeholder="What needs to be done?"
                autocomplete="off"
            />
            <button id="addBtn">Add</button>
        </div>

        <ul id="todoList"></ul>

        <div class="actions">
            <button class="action-btn clear-completed-btn" id="clearCompletedBtn">Clear Completed</button>
            <button class="action-btn clear-btn" id="clearAllBtn">Clear All</button>
        </div>
    </div>


    <script src="app.js"></script>
</body>
</html>
